name: Preprocessing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas==2.2.0

    - name: Run automated preprocessing script
      run: |
        cd preprocessing
        python automate_Nurrizky.py

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and push processed datasets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add preprocessing/titanic_preprocessed_train.csv preprocessing/titanic_preprocessed_test.csv || echo "Nothing to add"
        git diff --cached --quiet && echo "No changes to commit" || (
          git commit -m "chore(data): auto-update processed datasets"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
        )
